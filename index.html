<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raid Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0b0f;color:#e0e2ea;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
a{text-decoration:none;color:inherit}
.site-header{padding:28px 40px 0;display:flex;align-items:center;justify-content:space-between}
.site-logo{font-size:18px;font-weight:700;letter-spacing:.04em;color:#fff}
.site-logo span{color:#4f8eff}
main{padding:32px 40px 60px}
.raid-section{margin-bottom:48px}
.raid-title{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#6b7080;margin-bottom:18px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.06)}
.boss-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.boss-card{position:relative;height:110px;border-radius:8px;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,.08);transition:border-color .2s,transform .15s;display:block}
.boss-card:hover{border-color:rgba(79,142,255,.5);transform:translateY(-2px)}
.boss-card img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.55);transition:filter .2s}
.boss-card:hover img{filter:brightness(.75)}
.boss-card-label{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:linear-gradient(transparent,rgba(0,0,0,.85))}
.boss-card-name{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff}
.empty-card{height:110px;border-radius:8px;border:1px dashed rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:#3a3d4a;font-size:13px;cursor:pointer;transition:border-color .2s,color .2s}
.empty-card:hover{border-color:rgba(79,142,255,.4);color:#4f8eff}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s}
.btn-ghost{background:transparent;border-color:rgba(255,255,255,.15);color:#a0a8ba}
.btn-ghost:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.25)}
.btn-primary{background:rgba(79,142,255,.15);border-color:rgba(79,142,255,.4);color:#7eb3ff}
.btn-primary:hover{background:rgba(79,142,255,.25)}
.btn-danger{background:rgba(220,60,60,.12);border-color:rgba(220,60,60,.35);color:#f87171}
.btn-danger:hover{background:rgba(220,60,60,.22)}
.btn-success{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.35);color:#4ade80}
.btn-success:hover{background:rgba(74,222,128,.22)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#13151f;border:1px solid rgba(255,255,255,.1);border-radius:12px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;padding:24px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700;color:#e0e2ea}
.modal-close{background:none;border:none;color:#6b7080;font-size:22px;cursor:pointer;padding:0 6px;border-radius:4px;line-height:1}
.modal-close:hover{background:rgba(255,255,255,.06);color:#e0e2ea}
.ed-raid{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:16px;margin-bottom:12px}
.ed-raid-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ed-raid-name{font-size:14px;font-weight:700;color:#e0e2ea;flex:1}
.ed-boss-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.ed-boss-row:last-of-type{border-bottom:none}
.ed-boss-name{font-size:13px;color:#c0c8d8;flex:1;min-width:0}
.ed-boss-path{font-size:11px;color:#6b7080;flex:2;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.ed-add{background:rgba(79,142,255,.05);border:1px dashed rgba(79,142,255,.2);border-radius:6px;padding:12px;margin-top:10px}
.ed-add-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#4f8eff;margin-bottom:8px}
.ed-row{display:flex;gap:8px;margin-bottom:4px}
.ed-row input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:5px;color:#e0e2ea;font-size:12px;padding:6px 10px;outline:none;min-width:0}
.ed-row input:focus{border-color:rgba(79,142,255,.5)}
.ed-row input::placeholder{color:#3a3d4a}
.ed-hint{font-size:10px;color:#3a3d4a;margin-top:2px}
.ed-new-raid{background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.1);border-radius:8px;padding:14px;margin-bottom:4px}
.ed-new-raid-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#6b7080;margin-bottom:8px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.07)}
.loading{text-align:center;padding:80px 20px;color:#3a3d4a;font-size:14px}
</style>
</head>
<body>

<header class="site-header">
  <div class="site-logo">WoW<span>Raid</span></div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-ghost" onclick="openEditor()">⚙ Upravit manifest</button>
  </div>
</header>

<main id="mainContent">
  <div class="loading">Načítám raidy…</div>
</main>

<div class="modal-overlay" id="editorModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Upravit manifest</span>
      <button class="modal-close" onclick="closeEditor()">×</button>
    </div>
    <div id="editorBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeEditor()">Zavřít</button>
      <button class="btn btn-success" onclick="downloadManifest()">⬇ Stáhnout manifest.json</button>
    </div>
  </div>
</div>

<script>
const GH_RAW = 'https://raw.githubusercontent.com/fiteqqq/WoWGuide/main/';
let _manifest = { raids: [] };

async function init(){
  try{
    const r = await fetch(GH_RAW + 'Images/manifest.json?_=' + Date.now());
    if(r.ok) _manifest = await r.json();
  }catch(e){}
  renderDashboard();
}

function renderDashboard(){
  const main = document.getElementById('mainContent');
  const raids = _manifest.raids || [];
  if(!raids.length){
    main.innerHTML = '<div class="loading">Žádné raidy v manifestu.<br><br><button class="btn btn-primary" onclick="openEditor()">+ Přidat raid</button></div>';
    return;
  }
  main.innerHTML = raids.map(raid => `
    <section class="raid-section">
      <div class="raid-title">${escH(raid.name)}</div>
      <div class="boss-grid">
        ${(raid.bosses||[]).map(boss=>`
          <a class="boss-card" href="guide.html?boss=${encodeURIComponent(boss.slug)}">
            <img src="${GH_RAW}${escH(boss.thumbnail)}" alt="${escH(boss.name)}" onerror="this.style.opacity='0'">
            <div class="boss-card-label">
              <div class="boss-card-name">${escH(boss.name)}</div>
            </div>
          </a>
        `).join('')}
        <div class="empty-card" onclick="openEditor()">+ Přidat bosse</div>
      </div>
    </section>
  `).join('');
}

function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toSlug(s){ return s.toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }

function openEditor(){ renderEditor(); document.getElementById('editorModal').classList.add('open'); }
function closeEditor(){ document.getElementById('editorModal').classList.remove('open'); }

function renderEditor(){
  const raids = _manifest.raids || [];
  document.getElementById('editorBody').innerHTML = raids.map((raid,ri)=>`
    <div class="ed-raid">
      <div class="ed-raid-head">
        <span class="ed-raid-name">${escH(raid.name)}</span>
        <button class="btn btn-danger" onclick="removeRaid(${ri})" style="padding:3px 10px;font-size:11px">Smazat raid</button>
      </div>
      ${(raid.bosses||[]).map((boss,bi)=>`
        <div class="ed-boss-row">
          <span class="ed-boss-name">${escH(boss.name)}</span>
          <span class="ed-boss-path" title="${escH(boss.image)}">${escH(boss.image)}</span>
          <button class="btn btn-danger" onclick="removeBoss(${ri},${bi})" style="padding:2px 8px;font-size:11px">×</button>
        </div>
      `).join('')}
      <div class="ed-add">
        <div class="ed-add-title">Přidat bosse do ${escH(raid.name)}</div>
        <div class="ed-row">
          <input type="text" id="bossName_${ri}" placeholder="Název bosse">
          <input type="text" id="bossImg_${ri}" placeholder="Images/${escH(raid.slug)}/NazevBosse.png">
        </div>
        <div class="ed-hint">Slug se vygeneruje automaticky z názvu</div>
        <button class="btn btn-primary" style="margin-top:8px;font-size:11px" onclick="addBoss(${ri})">+ Přidat bosse</button>
      </div>
    </div>
  `).join('') + `
    <div class="ed-new-raid">
      <div class="ed-new-raid-title">Přidat nový raid</div>
      <div class="ed-row">
        <input type="text" id="newRaidName" placeholder="Název raidu">
        <button class="btn btn-primary" style="font-size:11px" onclick="addRaid()">+ Vytvořit</button>
      </div>
    </div>`;
}

function addBoss(ri){
  const name=(document.getElementById('bossName_'+ri).value||'').trim();
  const img=(document.getElementById('bossImg_'+ri).value||'').trim();
  if(!name||!img){alert('Vyplň název i cestu k obrázku');return;}
  (_manifest.raids[ri].bosses=_manifest.raids[ri].bosses||[]).push({slug:toSlug(name),name,thumbnail:img,image:img});
  renderEditor();renderDashboard();
}
function removeBoss(ri,bi){
  if(!confirm('Smazat bosse?'))return;
  _manifest.raids[ri].bosses.splice(bi,1);
  renderEditor();renderDashboard();
}
function addRaid(){
  const name=(document.getElementById('newRaidName').value||'').trim();
  if(!name){alert('Vyplň název raidu');return;}
  _manifest.raids.push({slug:toSlug(name),name,bosses:[]});
  renderEditor();renderDashboard();
}
function removeRaid(ri){
  if(!confirm('Smazat celý raid?'))return;
  _manifest.raids.splice(ri,1);
  renderEditor();renderDashboard();
}
function downloadManifest(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(_manifest,null,2)],{type:'application/json'}));
  a.download='manifest.json';a.click();
}

init();
</script>
</body>
</html>

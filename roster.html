<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roster — Trial / Attendance Tracker</title>
<style>
  :root{
    --bg:#0a0b0f; --surface:#13151f; --surface2:#1a1d2a; --border2:#272b3d;
    --text:#e0e2ea; --text-mid:#a8b0c8; --text-dim:#6b7080; --accent:#4f8eff; --accent-border:rgba(79,142,255,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;padding:28px 26px 60px}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1100px;margin:0 auto}
  .topbar{display:flex;align-items:center;gap:14px;margin-bottom:6px;flex-wrap:wrap}
  .home-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:var(--surface2);border:1px solid var(--border2);color:var(--text-mid);font-size:12px;font-weight:600;cursor:pointer}
  .home-btn:hover{color:var(--accent);border-color:var(--accent-border)}
  h1{font-size:24px;font-weight:800;letter-spacing:-.02em}
  .sub{font-size:12px;color:var(--text-dim);margin-top:2px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:18px 0 12px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s}
  .btn-ghost{background:var(--surface2);border-color:var(--border2);color:var(--text-mid)}
  .btn-ghost:hover{border-color:var(--accent-border);color:var(--accent)}
  .btn-accent{background:rgba(79,142,255,.15);border-color:var(--accent-border);color:#7eb3ff}
  .btn-accent:hover{background:rgba(79,142,255,.25)}
  .search{flex:1;min-width:160px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px;outline:none}
  .search:focus{border-color:var(--accent-border)}
  .status{font-size:11px;color:var(--text-dim)}
  .card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--border2);cursor:pointer;user-select:none;white-space:nowrap}
  th .arr{opacity:.5;font-size:9px}
  td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle}
  tr.flag{background:rgba(220,60,60,.10)}
  tr.flag td:first-child{box-shadow:inset 3px 0 0 0 #ef4444}
  .name{font-weight:700}
  .spec-ic{width:20px;height:20px;border-radius:4px;vertical-align:middle;margin-right:7px;border:1px solid rgba(255,255,255,.12)}
  .altcnt{font-size:10px;color:var(--text-dim);background:rgba(255,255,255,.06);border:1px solid var(--border2);border-radius:10px;padding:1px 7px;margin-left:7px;font-weight:600}
  .warn{font-size:10px;color:#f87171;font-weight:700;margin-left:6px}
  .rank{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;padding:4px 7px;outline:none;cursor:pointer}
  .cnt{font-weight:800;font-size:15px}
  .cnt.zero{color:#5b6070}
  .cnt.na{color:#3f4452;font-weight:600}
  .prog{font-size:12px;font-weight:700;line-height:1.5}
  .prog b{color:var(--text-dim);font-weight:700;font-size:10px;margin-right:3px}
  .prog .full{color:#4ade80}
  .break{font-size:10px;color:var(--text-dim);margin-top:1px}
  .note-in{width:100%;background:transparent;border:1px solid transparent;border-radius:5px;color:var(--text-mid);font-size:12px;padding:4px 6px;outline:none}
  .note-in:focus{border-color:var(--border2);background:rgba(255,255,255,.05)}
  .act{display:flex;gap:5px;justify-content:flex-end}
  .iconbtn{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text-mid);font-size:11px;padding:4px 8px;cursor:pointer;white-space:nowrap}
  .iconbtn:hover{border-color:var(--accent-border);color:var(--accent)}
  .iconbtn.del:hover{border-color:rgba(239,68,68,.5);color:#f87171}
  .iconbtn.promo:hover{border-color:rgba(74,222,128,.5);color:#4ade80}
  .expand{cursor:pointer;color:var(--text-dim);font-size:12px;user-select:none}
  .chars{background:rgba(0,0,0,.28);border-radius:8px;padding:11px 13px;margin:2px 0 6px}
  .char-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
  .char-row input[type=text]{flex:1 1 160px;min-width:110px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;padding:5px 8px;outline:none}
  .char-row .lbl{font-size:11px;color:var(--text-dim)}
  .mainbadge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);background:rgba(79,142,255,.12);border:1px solid var(--accent-border);border-radius:8px;padding:1px 7px}
  .bulkbar{display:flex;align-items:center;gap:10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:8px 14px;margin-bottom:10px;font-size:13px;color:var(--text)}
  .rowchk{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;vertical-align:middle;margin-right:5px}
  .mini-num{width:58px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;padding:5px;outline:none;text-align:center}
  .empty{text-align:center;color:var(--text-dim);font-size:14px;padding:50px 10px}
  .legend{font-size:11px;color:var(--text-dim);margin-top:12px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--accent-border);border-radius:8px;padding:9px 16px;color:var(--accent);font-size:13px;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .addmodal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
  .addmodal-bg.open{display:flex}
  .addmodal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:22px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
  .am-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .am-head h2{margin:0;font-size:18px}
  .am-lbl{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);font-weight:700;margin:12px 0 5px}
  .am-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:13px;padding:8px 11px;outline:none;font-family:inherit}
  .am-input:focus{border-color:var(--accent-border)}
  .am-classes{display:flex;flex-wrap:wrap;gap:5px}
  .am-cls{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;font-size:11px;font-weight:600;padding:5px 9px;cursor:pointer;text-transform:capitalize}
  .am-cls.sel{background:rgba(255,255,255,.10);box-shadow:0 0 0 1px currentColor inset}
  .am-specs{display:flex;flex-wrap:wrap;gap:5px;min-height:30px;align-items:center}
  .am-spec{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;font-size:11px;padding:4px 8px;cursor:pointer;color:var(--text)}
  .am-spec img{width:16px;height:16px;border-radius:3px}
  .am-spec.sel{border-color:var(--accent-border);background:rgba(79,142,255,.14)}
  .am-hint{font-size:11px;color:var(--text-dim)}
  .am-match{font-size:12px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25);border-radius:8px;padding:8px 11px;margin-top:8px}
  .am-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
  .wcl-panel{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;margin-bottom:12px}
  .wcl-grid{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .wcl-field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:150px}
  .wcl-field label{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-dim);font-weight:700}
  .wcl-panel input,.wcl-panel select,.wcl-panel textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;padding:6px 9px;outline:none;width:100%;font-family:inherit}
  .wcl-panel input:focus,.wcl-panel textarea:focus,.wcl-panel select:focus{border-color:var(--accent-border)}
  .wcl-row{margin-bottom:10px}
  .wcl-chk{font-size:13px;color:var(--text);display:inline-flex;align-items:center;gap:7px;cursor:pointer}
  .wcl-log{font-size:11px;color:var(--text-dim);font-family:monospace;max-height:160px;overflow-y:auto;margin-top:8px;white-space:pre-wrap;line-height:1.5}
  .wcl-log .ok{color:#4ade80}
  .wcl-log .err{color:#f87171}
  .wcl-unassigned{background:rgba(250,204,21,.07);border:1px solid rgba(250,204,21,.25);border-radius:8px;padding:10px 12px;margin-top:10px}
  .wcl-un-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;font-size:12px}
  .wcl-un-row .nm{font-weight:700;min-width:140px}
  .wcl-un-row select{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-size:11px;padding:3px 5px;width:auto}
  .filterbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .filterbar .lbl{font-size:11px;color:var(--text-dim);margin-right:2px}
  .fchip{padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);color:var(--text-dim);font-size:12px;font-weight:600;cursor:pointer;user-select:none;transition:all .12s}
  .fchip.on{border-color:var(--accent-border);color:var(--accent);background:rgba(79,142,255,.12)}
  .fchip:hover{border-color:var(--accent-border)}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="home-btn" href="index.html">⌂ Dashboard</a>
    <div style="flex:1">
      <h1>Roster</h1>
      <div class="sub">Globální přehled hráčů, ranků a účasti (Heroic / Mythic). Pro rozhodování o promotu trial → core.</div>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn btn-accent" onclick="openAdd()">+ Přidat hráče</button>
    <button class="btn btn-ghost" onclick="addRank()">+ Rank</button>
    <button class="btn btn-ghost" onclick="importRoster()" title="Naimportovat hráče z hlavního rosteru (Assignments)">⬇ Import z rosteru</button>
    <button class="btn btn-ghost" onclick="wclToggle()">↻ WCL účast</button>
    <button class="btn btn-ghost" onclick="clearAll()" title="Smazat všechny hráče" style="color:#f87171;border-color:rgba(239,68,68,.3)">🗑 Vymazat vše</button>
    <input class="search" id="search" placeholder="Hledat hráče / poznámku…" oninput="render()">
    <span class="status" id="status"></span>
  </div>

  <div class="filterbar" id="filterbar"></div>
  <div id="bulkbar"></div>

  <!-- WCL panel -->
  <div class="wcl-panel" id="wclPanel" style="display:none">
    <div class="wcl-grid">
      <div class="wcl-field"><label>WCL Client ID</label><input id="wclId" placeholder="z warcraftlogs.com/api/clients"></div>
      <div class="wcl-field"><label>Client Secret</label><input id="wclSec" type="password" placeholder="secret"></div>
      <button class="btn btn-ghost" onclick="wclSaveCreds()" style="align-self:end">Uložit klíče</button>
    </div>
    <div class="wcl-row"><label class="wcl-chk"><input type="checkbox" id="wclGuildChk"> Načíst i <b>guild log</b> (posledních 6 týdnů)</label></div>
    <div class="wcl-grid" id="wclGuildFields" style="display:none">
      <div class="wcl-field"><label>Guild</label><input id="wclGuild" placeholder="Název guildy"></div>
      <div class="wcl-field"><label>Realm (slug)</label><input id="wclRealm" placeholder="napr. twisting-nether"></div>
      <div class="wcl-field"><label>Region</label><select id="wclRegion"><option>EU</option><option>US</option><option>KR</option><option>TW</option></select></div>
    </div>
    <div class="wcl-row" style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
      <div class="wcl-field" style="flex:1;min-width:220px"><label>Raid pro progress (kolik bossů zabito)</label><select id="wclZone"><option value="">— načti raidy —</option></select></div>
      <button class="btn btn-ghost" onclick="wclLoadZones()">Načíst raidy</button>
    </div>
    <div class="wcl-row"><label style="display:block;margin-bottom:4px;font-size:11px;color:var(--text-dim)">Ruční reporty (URL nebo kódy, jeden na řádek) — i personal logy</label>
      <textarea id="wclReports" rows="3" placeholder="https://www.warcraftlogs.com/reports/aBcD1234...&#10;aBcD1234..."></textarea></div>
    <div class="wcl-row" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <button class="btn btn-accent" onclick="wclRun()" id="wclRunBtn">↻ Načíst účast (6 týdnů)</button>
      <span class="status" id="wclStatus"></span>
    </div>
    <div id="wclUnassigned"></div>
    <div id="wclLog" class="wcl-log"></div>
  </div>

  <div class="card"><div id="tableWrap"></div></div>
  <div class="legend">⚠ Trial bez jediného Heroic raidu je červeně zvýrazněný. WCL auto-načítání účasti přidáme v dalším kroku. Klikni na ▸ u hráče pro slučování altů.</div>
</div>
<!-- Přidat hráče modal -->
<div class="addmodal-bg" id="addModal">
  <div class="addmodal">
    <div class="am-head"><h2>Přidat hráče</h2><button onclick="closeAdd()" class="iconbtn">✕</button></div>
    <label class="am-lbl">Jméno postavy</label>
    <input id="apName" class="am-input" placeholder="napiš jméno…" oninput="apLookup()" autocomplete="off">
    <div id="apFound" class="am-found"></div>
    <div id="apManual">
      <label class="am-lbl">Class</label>
      <div class="am-classes" id="apClasses"></div>
      <label class="am-lbl">Spec</label>
      <div class="am-specs" id="apSpecs"></div>
    </div>
    <label class="am-lbl">Rank</label>
    <select id="apRank" class="am-input"></select>
    <div class="am-actions"><button class="btn btn-accent" onclick="apAdd()">Přidat</button><button class="btn btn-ghost" onclick="closeAdd()">Zrušit</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE='https://raidguide-api.filip-tesarik1.workers.dev';
const TRK_KEY='trial-roster';
const CC={deathknight:'#C41E3A',demonhunter:'#A330C9',druid:'#FF7C0A',evoker:'#33937F',hunter:'#AAD372',mage:'#3FC7EB',monk:'#00FF98',paladin:'#F48CBA',priest:'#FFFFFF',rogue:'#FFF468',shaman:'#0070DD',warlock:'#8788EE',warrior:'#C69B3A'};
const WH_ICON=n=>n?`https://wow.zamimg.com/images/wow/icons/small/${n}.jpg`:'';
const SPECS={
  deathknight:[{name:'Blood',icon:'spell_deathknight_bloodpresence'},{name:'Frost',icon:'spell_deathknight_frostpresence'},{name:'Unholy',icon:'spell_deathknight_unholypresence'}],
  demonhunter:[{name:'Havoc',icon:'ability_demonhunter_specdps'},{name:'Vengeance',icon:'ability_demonhunter_spectank'},{name:'Devourer',icon:'classicon_demonhunter_void'}],
  druid:[{name:'Balance',icon:'spell_nature_starfall'},{name:'Feral',icon:'ability_druid_catform'},{name:'Guardian',icon:'ability_racial_bearform'},{name:'Restoration',icon:'spell_nature_healingtouch'}],
  evoker:[{name:'Devastation',icon:'classicon_evoker_devastation'},{name:'Augmentation',icon:'classicon_evoker_augmentation'},{name:'Preservation',icon:'classicon_evoker_preservation'}],
  hunter:[{name:'Beast Mastery',icon:'ability_hunter_bestialdiscipline'},{name:'Marksmanship',icon:'ability_hunter_focusedaim'},{name:'Survival',icon:'ability_hunter_camouflage'}],
  mage:[{name:'Arcane',icon:'spell_holy_magicalsentry'},{name:'Fire',icon:'spell_fire_firebolt02'},{name:'Frost',icon:'spell_frost_frostbolt02'}],
  monk:[{name:'Brewmaster',icon:'monk_stance_drunkenox'},{name:'Mistweaver',icon:'monk_stance_wiseserpent'},{name:'Windwalker',icon:'monk_stance_whitetiger'}],
  paladin:[{name:'Holy',icon:'spell_holy_holybolt'},{name:'Protection',icon:'ability_paladin_shieldofthetemplar'},{name:'Retribution',icon:'spell_holy_auraoflight'}],
  priest:[{name:'Discipline',icon:'spell_holy_powerwordshield'},{name:'Holy',icon:'spell_holy_guardianspirit'},{name:'Shadow',icon:'spell_shadow_shadowwordpain'}],
  rogue:[{name:'Assassination',icon:'ability_rogue_deadlybrew'},{name:'Outlaw',icon:'ability_rogue_waylay'},{name:'Subtlety',icon:'ability_stealth'}],
  shaman:[{name:'Elemental',icon:'spell_nature_lightning'},{name:'Enhancement',icon:'spell_shaman_improvedstormstrike'},{name:'Restoration',icon:'spell_nature_magicimmunity'}],
  warlock:[{name:'Affliction',icon:'spell_shadow_deathcoil'},{name:'Demonology',icon:'spell_shadow_metamorphosis'},{name:'Destruction',icon:'spell_shadow_rainoffire'}],
  warrior:[{name:'Arms',icon:'ability_warrior_savageblow'},{name:'Fury',icon:'ability_warrior_innerrage'},{name:'Protection',icon:'ability_warrior_defensivestance'}]
};
let _apCls='',_apSpec=null,_apMatch=null,_mainRosterCache=null,_apTimer=null;

let people=[];
let ranks=['Core','Member','Trial'];
let expanded={};
let sortKey='rank', sortDir=1;
let hiddenRanks=new Set();
let selected=new Set();
let saveTimer=null;

function uid(){return 't'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function find(id){return people.find(p=>p.id===id);}
function totals(p){let h=0,m=0;(p.chars||[]).forEach(c=>{h+=(+c.h||0);m+=(+c.m||0);});return{h,m};}
function breakdown(p,key){const a=(p.chars||[]).filter(c=>(+c[key]||0)>0).map(c=>`${c.name||'?'} ${+c[key]||0}×`);return a.length>1?a.join(' · '):'';}
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200);}

async function load(){
  const st=document.getElementById('status');st.textContent='Načítám…';
  try{
    const r=await fetch(API_BASE+'/api/roster/'+TRK_KEY,{cache:'no-cache'});
    if(r.ok){const j=await r.json();if(j){if(Array.isArray(j.people))people=j.people;if(Array.isArray(j.ranks)&&j.ranks.length)ranks=j.ranks;}}
  }catch(e){
    try{const d=JSON.parse(localStorage.getItem('trkData')||'null');if(d){people=d.people||[];if(d.ranks&&d.ranks.length)ranks=d.ranks;}}catch(_){}
  }
  st.textContent='';
  render();
}
function save(){
  try{localStorage.setItem('trkData',JSON.stringify({people,ranks}));}catch(e){}
  clearTimeout(saveTimer);
  const st=document.getElementById('status');st.textContent='Ukládám…';
  saveTimer=setTimeout(async()=>{
    try{await fetch(API_BASE+'/api/roster/'+TRK_KEY,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({people,ranks,updatedAt:new Date().toISOString()})});st.textContent='✓ Uloženo';setTimeout(()=>{if(st.textContent==='✓ Uloženo')st.textContent='';},1500);}
    catch(e){st.textContent='⚠ Cloud offline (uloženo lokálně)';}
  },700);
}

function setSort(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=1;}render();}
function sortedPeople(filtered){
  const arr=filtered.slice();
  arr.sort((a,b)=>{
    let va,vb;
    if(sortKey==='name'){va=(a.name||'').toLowerCase();vb=(b.name||'').toLowerCase();}
    else if(sortKey==='rank'){va=ranks.indexOf(a.rank);vb=ranks.indexOf(b.rank);}
    else if(sortKey==='h'){va=totals(a).h;vb=totals(b).h;}
    else if(sortKey==='m'){va=totals(a).m;vb=totals(b).m;}
    if(va<vb)return -1*sortDir;if(va>vb)return 1*sortDir;return 0;
  });
  return arr;
}

function render(){
  renderFilter();
  renderBulk();
  const wrap=document.getElementById('tableWrap');
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  const filtered=people.filter(p=>(!q||(p.name||'').toLowerCase().includes(q)||(p.note||'').toLowerCase().includes(q)||(p.chars||[]).some(c=>(c.name||'').toLowerCase().includes(q)))&&!hiddenRanks.has(p.rank));
  if(!people.length){wrap.innerHTML='<div class="empty">Zatím žádní hráči. Přidej prvního přes „+ Přidat hráče".</div>';return;}
  if(!filtered.length){wrap.innerHTML='<div class="empty">Žádný hráč neodpovídá hledání.</div>';return;}
  const arr=sortedPeople(filtered);
  const arrow=k=>sortKey===k?`<span class="arr">${sortDir>0?'▲':'▼'}</span>`:'';

          ${c.specIcon?`<img class="spec-ic" src="${esc(c.specIcon)}" onerror="this.style.display='none'">`:''}

  });
  html+='</tbody></table>';
  wrap.innerHTML=html;
}

async function promote(id){
  const p=find(id);if(!p)return;
  if(!confirm(`Přesunout „${p.name}" do hlavního rosteru (core)?`))return;
  try{
    const r=await fetch(API_BASE+'/api/roster/main',{cache:'no-cache'});

    data.roster=Array.isArray(data.roster)?data.roster:[];
    if(!data.roster.find(x=>(x.name||'').toLowerCase()===p.name.toLowerCase())){
      data.roster.push({id:uid(),name:p.name,class:(p.cls||'warrior'),spec:'',specIcon:'',role:'dps'});

    }
    people=people.filter(x=>x.id!==id);save();render();

/* ───────── Import z hlavního rosteru (Assignments) ───────── */
async function importRoster(){
  if(!confirm('Naimportovat hráče z hlavního rosteru (Assignments)? Alty se zařadí pod maina; stávající se zkonsolidují.')) return;
  const st=document.getElementById('status'); st.textContent='Importuji…';
  try{
    const r=await fetch(API_BASE+'/api/roster/main',{cache:'no-cache'});
    const data=r.ok?await r.json():{};
    const rl=Array.isArray(data.roster)?data.roster:[];
    const byId={}; rl.forEach(pl=>{ if(pl&&pl.id) byId[pl.id]=pl; });
    const mainOf=pl=>{ let cur=pl,g=0; while(cur&&cur.altOf&&byId[cur.altOf]&&g<12){ cur=byId[cur.altOf]; g++; } return cur; };
    // seskup postavy podle maina
    const groups={};
    rl.forEach(pl=>{ if(!pl||!(pl.name||'').trim())return; const m=mainOf(pl); if(!m)return; (groups[m.id]=groups[m.id]||[]).push(pl); });
    const personByName=nm=>people.find(p=>(p.name||'').toLowerCase()===nm.toLowerCase()||(p.chars||[]).some(c=>(c.name||'').toLowerCase()===nm.toLowerCase()));
    let addedP=0, addedC=0;
    Object.keys(groups).forEach(mid=>{
      const m=byId[mid]; if(!m) return;
      const mainNm=(m.name||'').trim(); if(!mainNm) return;
      // main jako první, pak alty
      const members=groups[mid].slice().sort((a,b)=>(a.id===mid?-1:(b.id===mid?1:0)));
      let person=personByName(mainNm);
      if(!person){
        person={id:uid(),name:mainNm,rank:'Core',note:'',cls:(m.class||'').toLowerCase(),spec:m.spec||'',specIcon:m.specIcon||'',chars:[]};
        people.push(person); addedP++;
      } else {
        if(!person.cls&&m.class) person.cls=(m.class||'').toLowerCase();
        if(!person.specIcon&&m.specIcon) person.specIcon=m.specIcon;
      }
      members.forEach(pl=>{
        const cn=(pl.name||'').trim(); if(!cn) return;
        const plCls=(pl.class||'').toLowerCase(), plIco=pl.specIcon||'';
        // počty ze samostatného hráče (pokud už existuje) → slož pod maina, samostatného smaž
        let h=0,m=0; const standalone=people.find(pp=>pp!==person && (pp.name||'').toLowerCase()===cn.toLowerCase());
        if(standalone){ (standalone.chars||[]).forEach(c=>{ h+=(+c.h||0); m+=(+c.m||0); }); people=people.filter(pp=>pp!==standalone); }
        const ex=(person.chars||[]).find(c=>(c.name||'').toLowerCase()===cn.toLowerCase());
        if(ex){ ex.cls=ex.cls||plCls; ex.specIcon=ex.specIcon||plIco; if(standalone){ ex.h=ex.h||h; ex.m=ex.m||m; } }
        else { (person.chars=person.chars||[]).push({name:cn,h,m,cls:plCls,specIcon:plIco}); addedC++; }
      });
    });
    save(); render();
    st.textContent='';
    toast(`Import hotov: ${addedP} nových hráčů, ${addedC} postav (alty pod mainy).`);
  }catch(e){ st.textContent=''; toast('Import selhal: '+e.message); }
}

let _wclMeta={};

function wclLog(msg,cls){ const el=document.getElementById('wclLog'); if(!el)return; el.innerHTML+=`<div class="${cls||''}">${esc(msg)}</div>`; el.scrollTop=el.scrollHeight; }
async function wclToken(){
  const id=(document.getElementById('wclId').value||localStorage.getItem('wcl_id')||'').trim();
  const sec=(document.getElementById('wclSec').value||localStorage.getItem('wcl_sec')||'').trim();
  if(!id||!sec) throw new Error('Chybí WCL Client ID / Secret.');
  const res=await fetch('https://www.warcraftlogs.com/oauth/token',{method:'POST',headers:{'Authorization':'Basic '+btoa(id+':'+sec),'Content-Type':'application/x-www-form-urlencoded'},body:'grant_type=client_credentials'});
  if(!res.ok) throw new Error('Token selhal ('+res.status+'). Zkontroluj klíče.');
  const j=await res.json();
  if(!j.access_token) throw new Error('Token nevrácen.');
  return j.access_token;
}
async function wclGQL(token,query,variables){
  const res=await fetch('https://www.warcraftlogs.com/api/v2/client',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({query,variables})});
  const j=await res.json();
  if(j.errors) throw new Error('GraphQL: '+JSON.stringify(j.errors).slice(0,180));
  return j.data;
}
function parseReportCodes(text){
  const codes=[];
  (text||'').split(/[\s,]+/).forEach(tok=>{
    tok=(tok||'').trim(); if(!tok) return;
    const m=tok.match(/reports\/([a-zA-Z0-9]{16})/)||tok.match(/^([a-zA-Z0-9]{16})$/);
    if(m) codes.push(m[1]);
  });
  return codes;
}
async function wclGuildReportCodes(token,guild,realm,region,sinceTs){
  const q=`query($n:String!,$s:String!,$r:String!,$start:Float!){guildData{guild(name:$n,serverSlug:$s,serverRegion:$r){reports(limit:50,startTime:$start){data{code startTime}}}}}`;
  const d=await wclGQL(token,q,{n:guild,s:realm,r:region,start:sinceTs});
  const reps=(d&&d.guildData&&d.guildData.guild&&d.guildData.guild.reports&&d.guildData.guild.reports.data)||[];
  return reps.map(r=>r.code);
}
function _wclEntries(pd){
  try{
    const o=(pd&&pd.data&&pd.data.playerDetails)||(pd&&pd.playerDetails)||pd||{};
    return [].concat(o.tanks||[],o.healers||[],o.dps||[]).filter(x=>x&&x.name);
  }catch(e){ return []; }
}
async function wclReportAttendance(token,code){
  const q=`query($c:String!){reportData{report(code:$c){heroic:playerDetails(startTime:0,endTime:99999999999,difficulty:4) mythic:playerDetails(startTime:0,endTime:99999999999,difficulty:5)}}}`;
  const d=await wclGQL(token,q,{c:code});
  const rep=d&&d.reportData&&d.reportData.report;
  try{ console.log('WCL report',code,rep); }catch(e){}
  const he=_wclEntries(rep&&rep.heroic), me=_wclEntries(rep&&rep.mythic);
  [].concat(he,me).forEach(x=>{ if(x.name&&x.type) _wclMeta[String(x.name).toLowerCase()]=String(x.type).toLowerCase(); });
  return { h:new Set(he.map(x=>x.name)), m:new Set(me.map(x=>x.name)) };
}
async function wclLoadZones(){
  const sel=document.getElementById('wclZone'); if(!sel) return;
  try{
    const token=await wclToken();
    const d=await wclGQL(token,`query{worldData{zones{id name encounters{id}}}}`,{});
    let zones=(d&&d.worldData&&d.worldData.zones)||[];
    zones=zones.filter(z=>z.encounters&&z.encounters.length).sort((a,b)=>b.id-a.id);
    const cur=localStorage.getItem('wcl_zone')||'';
    sel.innerHTML='<option value="">— vyber raid —</option>'+zones.map(z=>`<option value="${z.id}" data-bosses="${z.encounters.length}" ${String(z.id)===cur?'selected':''}>${esc(z.name)} (${z.encounters.length} bossů)</option>`).join('');
    wclLog('Raidů načteno: '+zones.length,'ok');
  }catch(e){ wclLog('Načtení raidů selhalo: '+e.message,'err'); }
}
async function wclCharProgress(token,name,realm,region,zoneID){
  const q=`query($n:String!,$s:String!,$r:String!,$z:Int!){characterData{character(name:$n,serverSlug:$s,serverRegion:$r){h:zoneRankings(zoneID:$z,difficulty:4) m:zoneRankings(zoneID:$z,difficulty:5)}}}`;
  const d=await wclGQL(token,q,{n:name,s:realm,r:region,z:zoneID});
  const ch=d&&d.characterData&&d.characterData.character;
  const killed=zr=>{ try{ const rk=(zr&&zr.rankings)||[]; return rk.filter(x=>x&&((x.totalKills||0)>0||x.rankPercent!=null)).length; }catch(e){ return 0; } };
  return { h:killed(ch&&ch.h), m:killed(ch&&ch.m) };
}
async function wclRun(){
  const btn=document.getElementById('wclRunBtn'); btn.disabled=true;
  _wclMeta={};
  document.getElementById('wclLog').innerHTML='';
  const st=document.getElementById('wclStatus'); st.textContent='Pracuji…';
  try{
    wclLog('Získávám token…');
    const token=await wclToken(); wclLog('Token OK.','ok');
    const sinceTs=Date.now()-42*24*3600*1000;
    let codes=parseReportCodes(document.getElementById('wclReports').value);
    wclLog('Ruční reporty: '+codes.length);
    if(document.getElementById('wclGuildChk').checked){
      const g=document.getElementById('wclGuild').value.trim();
      const rl=document.getElementById('wclRealm').value.trim();
      const rg=document.getElementById('wclRegion').value.trim();
      localStorage.setItem('wcl_guild',g);localStorage.setItem('wcl_realm',rl);localStorage.setItem('wcl_region',rg);
      if(g&&rl){ wclLog('Načítám guild reporty (6 týdnů)…'); const gc=await wclGuildReportCodes(token,g,rl,rg,sinceTs); wclLog('Guild reportů: '+gc.length); codes=codes.concat(gc); }
      else wclLog('Guild jméno/realm chybí — přeskakuji guild.','err');
    }
    codes=[...new Set(codes)];
    wclLog('Celkem reportů po dedup: '+codes.length);
    if(!codes.length) throw new Error('Žádné reporty k načtení.');
    const counts={};
    let i=0;
    for(const code of codes){
      i++; st.textContent=`Report ${i}/${codes.length}…`;
      try{
        const att=await wclReportAttendance(token,code);
        att.h.forEach(n=>{ (counts[n]=counts[n]||{h:0,m:0}).h++; });
        att.m.forEach(n=>{ (counts[n]=counts[n]||{h:0,m:0}).m++; });
        wclLog(`✓ ${code}: Heroic ${att.h.size} · Mythic ${att.m.size}`);
      }catch(e){ wclLog(`✗ ${code}: ${e.message}`,'err'); }
      await new Promise(r=>setTimeout(r,120));
    }
    applyWclCounts(counts);
    // Progress (Trial/Member) z aktuálního raidu
    const zoneID=parseInt(document.getElementById('wclZone').value||'0');
    if(zoneID){
      const bossTotal=parseInt(localStorage.getItem('wcl_zone_bosses')||'0')||'?';
      const realm=(document.getElementById('wclRealm').value||localStorage.getItem('wcl_realm')||'').trim();
      const region=(document.getElementById('wclRegion').value||localStorage.getItem('wcl_region')||'EU').trim();
      if(!realm){ wclLog('Pro progress vyplň Realm (slug) v poli guildy.','err'); }
      else{
        const targets=people.filter(p=>p.rank==='Trial'||p.rank==='Member');
        wclLog('Načítám progress pro '+targets.length+' hráčů (Trial/Member)…');
        let j=0;
        for(const p of targets){
          j++; st.textContent=`Progress ${j}/${targets.length}…`;
          const mc=(p.chars&&p.chars[0]&&p.chars[0].name)||p.name;
          try{ const pr=await wclCharProgress(token,mc,realm,region,zoneID); p.progH=pr.h+'/'+bossTotal; p.progM=pr.m+'/'+bossTotal; wclLog(`✓ ${mc}: progress H ${pr.h} · M ${pr.m}`); }
          catch(e){ wclLog(`✗ progress ${mc}: ${e.message}`,'err'); }
          await new Promise(r=>setTimeout(r,140));
        }
        save(); render();
      }
    }
    st.textContent='Hotovo ✓';
    wclLog('Hotovo. Postav z logů: '+Object.keys(counts).length,'ok');
  }catch(e){ st.textContent='Chyba'; wclLog('CHYBA: '+e.message,'err'); }
  btn.disabled=false;
}
function applyWclCounts(counts){
  _wclUn=[];
  const map={};
  people.forEach(p=>(p.chars||[]).forEach((c,ci)=>{ if(c.name) map[c.name.toLowerCase()]={p,ci}; }));
  Object.keys(counts).forEach(name=>{
    const cnt=counts[name]; const hit=map[name.toLowerCase()];
    if(hit){ hit.p.chars[hit.ci].h=cnt.h; hit.p.chars[hit.ci].m=cnt.m; }
    else _wclUn.push({name,h:cnt.h,m:cnt.m});
  });
  save(); render(); renderUnassigned();
}
function renderUnassigned(){
  const el=document.getElementById('wclUnassigned');
  if(!_wclUn.length){ el.innerHTML=''; return; }
  const opts=people.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  el.innerHTML=`<div class="wcl-unassigned"><div style="font-size:12px;font-weight:700;margin-bottom:8px;color:#facc15">Nepřiřazené postavy z logů (${_wclUn.length}) — přiřaď k hráči (alt) nebo vytvoř nového:</div>`+
    _wclUn.map((u,i)=>`<div class="wcl-un-row"><span class="nm" style="color:${CC[(_wclMeta[u.name.toLowerCase()]||'')]||'var(--text)'}">${esc(u.name)}</span><span style="color:var(--text-dim)">H ${u.h}× · M ${u.m}×</span>
      <select id="un_${i}"><option value="">— přiřadit k —</option>${opts}<option value="__new">+ nový hráč</option></select>
      <button class="iconbtn" onclick="wclAssign(${i})">OK</button></div>`).join('')+`</div>`;
}
function wclAssign(i){
  const u=_wclUn[i]; if(!u) return;
  const sel=document.getElementById('un_'+i); if(!sel) return;
  const v=sel.value;
  if(v==='__new'){ const id=uid(); people.push({id,name:u.name,rank:'Trial',note:'',cls:(_wclMeta[u.name.toLowerCase()]||''),spec:'',specIcon:'',chars:[{name:u.name,h:u.h,m:u.m}]}); }
  else if(v){ const p=find(v); if(p){ (p.chars=p.chars||[]).push({name:u.name,h:u.h,m:u.m,cls:(_wclMeta[u.name.toLowerCase()]||''),specIcon:''}); } }
  else return;
  _wclUn.splice(i,1); save(); render(); renderUnassigned();
}
document.getElementById('wclGuildChk').addEventListener('change',function(){ document.getElementById('wclGuildFields').style.display=this.checked?'flex':'none'; });
(function(){ const z=document.getElementById('wclZone'); if(z) z.addEventListener('change',function(){ const o=this.selectedOptions[0]; localStorage.setItem('wcl_zone',this.value||''); localStorage.setItem('wcl_zone_bosses',o?(o.dataset.bosses||''):''); }); })();

load();
</script>
